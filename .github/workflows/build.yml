name: 打包 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Buildozer 依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: 安装 Buildozer
        run: pip install buildozer Cython --quiet

      - name: 编译 APK
        run: buildozer android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: shift-alarm-app-debug
          path: bin/*.apk
